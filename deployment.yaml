apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: node-app
        image: 646724772680.dkr.ecr.ap-southeast-1.amazonaws.com/node-app:2
        ports:
        - containerPort: 3000
